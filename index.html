<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#d4af37"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PNF Enterprises">
<link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon-192.png">
<title>PrincesammisNewsFeed Enterprises</title>
<style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,serif;background:#0d0d1a;color:#f0e6c8;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#d4af37;border-radius:2px}
img{max-width:100%}

/* LOADING */
#loading{position:fixed;inset:0;background:rgba(13,13,26,.9);z-index:9500;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loading.on{display:flex}
.spin{width:40px;height:40px;border:3px solid rgba(212,175,55,.2);
  border-top-color:#d4af37;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:#d4af37;font-size:13px}

/* PAGES */
.pg{display:none;min-height:100vh}
.pg.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SPLASH */
#pgSplash{background:linear-gradient(135deg,#080816,#1a1040,#080816);
  display:flex!important;align-items:center;justify-content:center;
  flex-direction:column;position:fixed;inset:0;z-index:9000}
.sp-ico{font-size:72px;animation:pulse 1.5s infinite}
.sp-title{font-size:22px;color:#d4af37;font-weight:bold;margin:16px 0 5px;letter-spacing:2px}
.sp-sub{font-size:11px;color:#777;letter-spacing:4px}
.sp-bar{width:200px;height:3px;background:rgba(212,175,55,.2);border-radius:2px;margin-top:28px;overflow:hidden}
.sp-fill{height:100%;background:#d4af37;border-radius:2px;animation:spload 2.5s ease forwards}
@keyframes spload{0%{width:0}85%{width:90%}100%{width:100%}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* TOPBAR */
#topbar{background:#000;border-bottom:2px solid #d4af37;padding:9px 14px;
  display:none;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:800}
#topbar.on{display:flex}
.brand-row{display:flex;align-items:center;gap:8px}
#backBtn{background:transparent;border:none;color:#d4af37;font-size:22px;
  cursor:pointer;padding:2px 8px 2px 0;display:none}
#backBtn.on{display:inline}
.bname{font-size:14px;font-weight:bold;color:#d4af37;line-height:1.2}
.bname span{color:#7c4dff}
.btag{font-size:9px;color:#777;letter-spacing:2px}
nav{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.nb{background:transparent;color:#bbb;border:1px solid #444;border-radius:6px;
  padding:6px 9px;cursor:pointer;font-family:Georgia,serif;font-size:11px;
  transition:.2s;white-space:nowrap}
.nb.on{background:#d4af37;color:#000;border-color:#d4af37;font-weight:bold}
.nb:hover:not(.on){border-color:#d4af37;color:#d4af37}
.user-chip{font-size:11px;color:#d4af37;background:rgba(212,175,55,.1);
  border:1px solid rgba(212,175,55,.25);border-radius:20px;
  padding:5px 11px;cursor:pointer;white-space:nowrap;transition:.2s}
.user-chip.adm{color:#4caf80;border-color:#2ca05a;background:rgba(40,200,100,.08)}

/* LOGIN */
#pgLogin{background:linear-gradient(135deg,#080816,#140c30,#080816);
  display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh}
.lbox{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.3);
  border-radius:16px;padding:30px 22px;max-width:400px;width:100%;text-align:center}
.l-logo{font-size:48px;margin-bottom:10px}
.l-title{font-size:19px;color:#d4af37;font-weight:bold;margin-bottom:3px}
.l-sub{font-size:12px;color:#777;margin-bottom:22px}
.atabs{display:flex;border:1px solid #333;border-radius:8px;overflow:hidden;margin-bottom:22px}
.atab{flex:1;padding:10px;background:transparent;color:#777;border:none;
  cursor:pointer;font-family:Georgia,serif;font-size:13px;transition:.2s}
.atab.on{background:#d4af37;color:#000;font-weight:bold}
.fg{margin-bottom:13px;text-align:left}
.fl{font-size:11px;color:#d4af37;display:block;margin-bottom:5px;
  letter-spacing:.8px;text-transform:uppercase}
.fi,.fs,.ft{width:100%;background:rgba(255,255,255,.06);border:1px solid #3a3a55;
  border-radius:6px;padding:11px 13px;color:#f0e6c8;font-size:14px;outline:none;
  box-sizing:border-box;font-family:Georgia,serif;-webkit-appearance:none}
.fs{background:#12122a}.ft{resize:vertical;min-height:80px}
.fi:focus,.fs:focus,.ft:focus{border-color:#d4af37}
.btn-p{width:100%;background:#d4af37;color:#000;border:none;border-radius:8px;
  padding:12px;font-weight:bold;font-size:14px;cursor:pointer;font-family:Georgia,serif;margin-top:4px}
.btn-p:active{background:#b89020}
.g-btn{width:100%;background:rgba(255,255,255,.07);color:#ccc;border:1px solid #444;
  border-radius:8px;padding:11px;font-size:13px;cursor:pointer;font-family:Georgia,serif;
  margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.aerr{color:#f07070;font-size:12px;margin-top:8px;display:none}
.anote{font-size:11px;color:#444;margin-top:12px;line-height:1.6}

/* SECTION */
.sec{max-width:900px;margin:0 auto;padding:22px 14px}
.phdr{text-align:center;margin-bottom:20px}
.plbl{font-size:10px;letter-spacing:5px;color:#d4af37;text-transform:uppercase}
.pttl{font-size:22px;margin:6px 0 4px;color:#f0e6c8}
.psub{color:#777;font-size:13px}

/* HOME */
.bwrap{position:relative;width:100%;max-height:340px;overflow:hidden}
.bimg{width:100%;object-fit:cover;display:block;filter:brightness(.8)}
.bover{position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 30%,rgba(13,13,26,.93));
  display:flex;align-items:flex-end;padding:22px}
.bover h1{font-size:22px;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.9);line-height:1.3}
.bover p{color:#d4af37;font-size:13px;margin-top:5px}
.hcont{max-width:760px;margin:22px auto;padding:0 14px}
.wcard{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.3);
  border-radius:12px;padding:24px 18px;text-align:center}
.wlbl{font-size:10px;letter-spacing:5px;color:#d4af37;text-transform:uppercase;margin-bottom:8px}
.wmsg{font-size:18px;line-height:1.75;margin-bottom:12px}
.wdiv{width:44px;height:2px;background:#d4af37;margin:0 auto 12px}
.wdesc{color:#bbb;font-size:13px;line-height:1.8;margin-bottom:18px}
.bgrp{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn-g{background:#d4af37;color:#000;border:none;border-radius:30px;
  padding:10px 22px;font-weight:bold;font-size:13px;cursor:pointer;
  letter-spacing:.5px;font-family:Georgia,serif}
.btn-o{background:transparent;color:#d4af37;border:2px solid #d4af37;
  border-radius:30px;padding:10px 22px;font-weight:bold;font-size:13px;
  cursor:pointer;letter-spacing:.5px;font-family:Georgia,serif}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
.ccat{background:rgba(255,255,255,.03);border:1px solid #252540;
  border-radius:10px;padding:16px 8px;text-align:center;cursor:pointer;transition:.2s}
.ccat:hover,.ccat:active{border-color:#d4af37;background:rgba(212,175,55,.05)}
.ccat .ci{font-size:24px}
.ccat .cl{font-size:11px;color:#bbb;margin-top:5px;line-height:1.3}

/* TABS */
.tabs{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.tb{background:rgba(255,255,255,.05);color:#bbb;border:1px solid #333;
  border-radius:20px;padding:7px 14px;cursor:pointer;font-size:12px;
  font-family:Georgia,serif;transition:.2s;white-space:nowrap}
.tb.on{background:#d4af37;color:#000;border-color:#d4af37;font-weight:bold}

/* PROD BOX */
.pbox{background:rgba(255,255,255,.025);border:1px solid #252535;
  border-radius:12px;padding:18px;margin-bottom:18px}
.phrow{display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px;margin-bottom:14px}
.pt{color:#d4af37;font-size:16px;margin:0}
.hbtns{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* UPLOAD / TRASH BTNS */
.upwrap{position:relative;overflow:hidden;display:inline-block}
.upwrap input[type=file]{position:absolute;left:0;top:0;width:100%;
  height:100%;opacity:0;cursor:pointer;font-size:50px}
.upbtn{background:#d4af37;color:#000;border:none;border-radius:7px;
  padding:9px 15px;font-size:12px;font-family:Georgia,serif;font-weight:bold;
  pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tbtn{background:transparent;color:#e07070;border:1.5px solid #5a2020;
  border-radius:7px;padding:9px 12px;cursor:pointer;font-size:12px;
  font-family:Georgia,serif;white-space:nowrap;transition:.2s}
.tbtn.on{background:#5a1515;color:#ffa0a0;border-color:#e07070}

/* SBAR */
.sbar{margin-bottom:10px;font-size:11px}

/* NOTICES */
.nok,.nerr{border-radius:7px;padding:10px 14px;font-size:13px;display:none;margin-bottom:10px}
.nok{background:rgba(40,200,100,.1);border:1px solid #2ca05a;color:#4caf80}
.nerr{background:rgba(200,50,50,.1);border:1px solid #7a2020;color:#f07070}

/* PROGRESS */
.prog{height:4px;background:rgba(212,175,55,.12);border-radius:2px;
  margin-bottom:10px;display:none;overflow:hidden}
.pbar{height:100%;background:#d4af37;border-radius:2px;width:0;transition:width .3s}

/* GRID */
.empty{text-align:center;padding:30px 0;color:#555}
.eico{font-size:32px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px}
.card{background:rgba(255,255,255,.045);border:1px solid #2e2e48;
  border-radius:10px;padding:13px;display:flex;flex-direction:column;gap:3px}
.card.del{background:rgba(100,20,20,.08);border-color:#4a1a1a}
.thumb{width:100%;height:80px;object-fit:cover;border-radius:5px;margin-bottom:4px;cursor:pointer}
.ficon{font-size:28px;text-align:center;padding:7px 0}
.fname{font-size:12px;color:#e0d8c0;word-break:break-word;line-height:1.4;font-weight:bold}
.fcap{font-size:11px;color:#999;line-height:1.4;font-style:italic;margin-top:2px}
.fmeta{font-size:10px;color:#555;margin-top:2px}
.dbadge{font-size:10px;color:#e07070;background:rgba(180,40,40,.15);
  border-radius:3px;padding:2px 6px;text-align:center;margin-top:3px}

/* ACTION BUTTONS — spaced, labelled */
.acts{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ar{display:flex;gap:5px}
.ab{border:none;border-radius:6px;padding:7px 8px;font-size:11px;cursor:pointer;
  font-family:Georgia,serif;font-weight:bold;flex:1;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:3px;transition:.15s;min-width:0}
.ab .ico{font-size:13px}
.ab .lbl{font-size:10px}
.ab.vw{background:#141430;color:#8898ff;border:1px solid #252560}
.ab.vw:active{background:#1e1e50}
.ab.od{background:#302000;color:#d4af37;border:1px solid #504000}
.ab.od:active{background:#504000}
.ab.dl{background:#0a2818;color:#40df80;border:1px solid #165030}
.ab.dl:active{background:#165030}
.ab.de{background:#301010;color:#df8080;border:1px solid #502020}
.ab.de:active{background:#502020}
.ab.rs{background:#0a1830;color:#6098d8;border:1px solid #183060}
.ab.rs:active{background:#183060}
.ab.pd{background:#480808;color:#ff7070;border:1px solid #702020;
  width:100%;margin-top:3px;border-radius:5px}
.ab.pd:active{background:#702020}

/* NOTES GRID */
.ngrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-top:8px}
.ncat{background:rgba(255,255,255,.04);border:1px solid #252545;
  border-radius:12px;padding:20px 14px;text-align:center;cursor:pointer;
  transition:.2s;position:relative;overflow:hidden}
.ncat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.ncat.c0::before{background:#00bcd4}.ncat.c1::before{background:#ff9800}
.ncat.c2::before{background:#f44336}.ncat.c3::before{background:#ffeb3b}
.ncat.c4::before{background:#4caf50}.ncat.c5::before{background:#9c27b0}
.ncat.c6::before{background:#2196f3}
.ncat:hover,.ncat:active{border-color:#d4af37;transform:translateY(-2px)}
.ncat .nci{font-size:30px;margin-bottom:7px}
.ncat .ncl{font-size:12px;font-weight:bold;color:#f0e6c8;line-height:1.3}
.ncat .ncs{font-size:10px;color:#666;margin-top:3px}

/* ORDERS */
.owrap{max-width:560px;margin:0 auto;padding:22px 14px}
.obox{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.25);
  border-radius:12px;padding:22px}
.osbtn{width:100%;background:#d4af37;color:#000;border:none;border-radius:8px;
  padding:13px;font-weight:bold;font-size:14px;cursor:pointer;
  letter-spacing:.5px;font-family:Georgia,serif;margin-top:4px}
.osbtn:disabled{background:#444;color:#888;cursor:not-allowed}
.onote{color:#555;font-size:11px;text-align:center;margin-top:10px;line-height:1.6}
.sendbox{text-align:center;padding:18px;color:#d4af37;font-size:15px;display:none}
.sucbox,.failbox{border-radius:12px;padding:26px 18px;text-align:center;display:none}
.sucbox{background:rgba(40,200,100,.07);border:1px solid #2ca05a}
.failbox{background:rgba(200,50,50,.07);border:1px solid #7a2020}
.sico{font-size:44px;margin-bottom:10px}
.stitle{color:#4caf80;font-size:18px;margin-bottom:7px}
.smsg{color:#ccc;line-height:1.7;font-size:13px}
.seml{color:#d4af37;font-weight:bold}
.bagain{margin-top:16px;background:#d4af37;color:#000;border:none;
  border-radius:30px;padding:10px 22px;font-weight:bold;font-size:13px;
  cursor:pointer;font-family:Georgia,serif}
.fmsg{color:#f07070;line-height:1.7;font-size:13px;margin-bottom:12px}

/* ADMIN MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9200;
  display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mbox{background:#0c0c22;border:2px solid #d4af37;border-radius:14px;
  padding:26px 22px;max-width:350px;width:100%;text-align:center}
.mlock{font-size:40px;margin-bottom:6px}
.mtitle{font-size:17px;color:#d4af37;font-weight:bold;margin-bottom:3px}
.msub{font-size:12px;color:#777;margin-bottom:18px;line-height:1.5}
.mi{width:100%;background:rgba(255,255,255,.06);border:1px solid #444;
  border-radius:6px;padding:11px 13px;color:#f0e6c8;font-size:14px;
  outline:none;box-sizing:border-box;font-family:Georgia,serif;margin-bottom:10px}
.mi:focus{border-color:#d4af37}
.mbtns{display:flex;gap:8px;margin-top:4px}
.mok{flex:2;background:#d4af37;color:#000;border:none;border-radius:7px;
  padding:11px;font-weight:bold;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.mcan{flex:1;background:transparent;color:#777;border:1px solid #444;
  border-radius:7px;padding:11px;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.merr{color:#f07070;font-size:12px;margin-top:8px;display:none}
.mhint{font-size:10px;color:#444;margin-top:10px}

/* CAPTION MODAL */
.cmo{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9100;
  display:none;align-items:flex-end;justify-content:center}
.cmo.on{display:flex}
.cbox{background:#0e0e25;border-top:2px solid #d4af37;border-radius:16px 16px 0 0;
  padding:22px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.ctitle{color:#d4af37;font-size:16px;font-weight:bold;margin-bottom:14px;text-align:center}
.cpreview{width:100%;max-height:150px;object-fit:contain;border-radius:7px;
  margin-bottom:10px;display:none;background:#000}
.cicon{font-size:36px;text-align:center;margin-bottom:10px}
.cfiles{max-height:70px;overflow-y:auto;margin-bottom:10px}
.cfi{font-size:11px;color:#888;padding:3px 0;border-bottom:1px solid #1a1a2a}
.cinput{width:100%;background:rgba(255,255,255,.06);border:1px solid #444;
  border-radius:8px;padding:12px 13px;color:#f0e6c8;font-size:14px;
  outline:none;box-sizing:border-box;font-family:Georgia,serif;
  resize:none;margin-bottom:12px}
.cinput:focus{border-color:#d4af37}
.cbtns{display:flex;gap:8px}
.cup{flex:2;background:#d4af37;color:#000;border:none;border-radius:8px;
  padding:12px;font-weight:bold;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.cskip{flex:1;background:transparent;color:#777;border:1px solid #444;
  border-radius:8px;padding:12px;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.ccancel{width:100%;margin-top:8px;background:transparent;color:#555;
  border:none;font-size:13px;cursor:pointer;padding:6px;font-family:Georgia,serif}

/* FILE VIEWER */
.vmo{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9300;
  display:none;flex-direction:column}
.vmo.on{display:flex}
.vtop{display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;background:#000;border-bottom:1px solid #222;flex-shrink:0}
.vname{color:#d4af37;font-size:13px;font-weight:bold;flex:1;margin-right:10px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vclose{background:transparent;color:#f07070;border:1px solid #5a2020;
  border-radius:6px;padding:7px 13px;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.vbody{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center}
.vbody iframe{width:100%;height:100%;border:none}
.vbody img{max-width:100%;max-height:100%;object-fit:contain;padding:12px}

/* INSTALL BANNER */
.ibanner{display:none;position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(135deg,#0d0d1a,#1a183a);
  border-top:2px solid #d4af37;padding:11px 14px;z-index:8800;
  align-items:center;gap:10px}
.ibanner.on{display:flex}
.iicon{width:38px;height:38px;border-radius:9px;flex-shrink:0}
.itext{flex:1}
.ititle{color:#d4af37;font-weight:bold;font-size:13px}
.idesc{color:#666;font-size:11px;margin-top:1px}
.ibtn{background:#d4af37;color:#000;border:none;border-radius:20px;
  padding:8px 15px;font-weight:bold;font-size:12px;cursor:pointer;
  font-family:Georgia,serif;white-space:nowrap}
.ix{background:transparent;color:#555;border:none;font-size:20px;cursor:pointer;padding:0 3px}

/* FOOTER */
footer{border-top:1px solid #1c1c30;padding:16px;text-align:center;
  margin-top:36px;padding-bottom:56px}
.fbrand{color:#d4af37;font-size:13px;font-weight:bold;margin-bottom:3px}
.fbrand span{color:#7c4dff}
.finfo{color:#555;font-size:11px}

@media(max-width:500px){
  .cgrid{grid-template-columns:repeat(2,1fr)}
  .bover h1{font-size:18px}
  #topbar{padding:7px 10px}
  .bname{font-size:12px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(138px,1fr))}
  .ngrid{grid-template-columns:repeat(2,1fr)}
}
