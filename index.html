<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PrincesammisNewsFeed Enterprises</title>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,serif;background:#0d0d1a;color:#f0e6c8;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0d0d1a}::-webkit-scrollbar-thumb{background:#d4af37;border-radius:3px}

/* ── TOPBAR ── */
.bar{background:#000;border-bottom:2px solid #d4af37;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:900}
.bname{font-size:15px;font-weight:bold;color:#d4af37}.bname span{color:#7c4dff}
.btag{font-size:10px;color:#888;letter-spacing:2px}
nav{display:flex;gap:6px}
.nb{background:transparent;color:#bbb;border:1px solid #444;border-radius:6px;padding:7px 12px;cursor:pointer;font-family:Georgia,serif;font-size:12px;letter-spacing:.3px;transition:.2s;white-space:nowrap}
.nb.active{background:#d4af37;color:#000;border-color:#d4af37;font-weight:bold}
.nb:hover:not(.active){border-color:#d4af37;color:#d4af37}

/* ── PAGES ── */
.page{display:none}.page.show{display:block}

/* ── BANNER ── */
.bwrap{position:relative;width:100%;max-height:380px;overflow:hidden}
.bimg{width:100%;object-fit:cover;display:block;filter:brightness(.82)}
.bover{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(13,13,26,.93));display:flex;align-items:flex-end;padding:24px}
.bover h1{font-size:24px;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.9);line-height:1.3}
.bover p{color:#d4af37;font-size:13px;margin-top:5px}

/* ── HOME ── */
.hcont{max-width:760px;margin:28px auto;padding:0 16px}
.wcard{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.35);border-radius:12px;padding:28px 22px;text-align:center;box-shadow:0 0 40px rgba(212,175,55,.07)}
.wlbl{font-size:10px;letter-spacing:5px;color:#d4af37;text-transform:uppercase;margin-bottom:10px}
.wmsg{font-size:19px;line-height:1.75;margin-bottom:14px}
.wdiv{width:48px;height:2px;background:#d4af37;margin:0 auto 14px}
.wdesc{color:#bbb;font-size:14px;line-height:1.8;margin-bottom:22px}
.bgrp{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-gold{background:#d4af37;color:#000;border:none;border-radius:30px;padding:11px 26px;font-weight:bold;font-size:13px;cursor:pointer;letter-spacing:.8px;font-family:Georgia,serif}
.btn-out{background:transparent;color:#d4af37;border:2px solid #d4af37;border-radius:30px;padding:11px 26px;font-weight:bold;font-size:13px;cursor:pointer;letter-spacing:.8px;font-family:Georgia,serif}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:24px}
.ccat{background:rgba(255,255,255,.03);border:1px solid #2a2a3a;border-radius:10px;padding:16px 8px;text-align:center;cursor:pointer;transition:.2s}
.ccat:hover,.ccat:active{border-color:#d4af37;background:rgba(212,175,55,.06)}
.ccat .ci{font-size:24px}.ccat .cl{font-size:12px;color:#bbb;margin-top:5px}

/* ── SALES ── */
.sec{max-width:880px;margin:0 auto;padding:28px 16px}
.phdr{text-align:center;margin-bottom:24px}
.plbl{font-size:10px;letter-spacing:5px;color:#d4af37;text-transform:uppercase}
.pttl{font-size:24px;margin:7px 0 4px;color:#f0e6c8}
.psub{color:#888;font-size:13px}
.admin-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);border-radius:20px;padding:4px 12px;font-size:11px;color:#d4af37;cursor:pointer;margin-top:10px;transition:.2s}
.admin-badge.ok{color:#4caf80;border-color:#2ca05a;background:rgba(40,200,100,.08)}

/* TABS */
.tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.tb{background:rgba(255,255,255,.05);color:#bbb;border:1px solid #383838;border-radius:24px;padding:7px 16px;cursor:pointer;font-size:13px;font-family:Georgia,serif;transition:.2s}
.tb.active{background:#d4af37;color:#000;border-color:#d4af37;font-weight:bold}

/* PROD BOX */
.pbox{background:rgba(255,255,255,.025);border:1px solid #252535;border-radius:12px;padding:22px;margin-bottom:20px}
.phrow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.pt{color:#d4af37;font-size:17px;margin:0}
.hbtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* TRASH BTN */
.trash-btn{background:transparent;color:#e07070;border:1.5px solid #6a3030;border-radius:6px;padding:7px 13px;cursor:pointer;font-size:12px;font-family:Georgia,serif;white-space:nowrap;transition:.2s}
.trash-btn.on{background:#6a2020;color:#ffa0a0;border-color:#e07070}

/* UPLOAD BTN WRAPPER */
.upwrap{position:relative;overflow:hidden;display:inline-block}
.upwrap input[type=file]{position:absolute;left:0;top:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:50px;margin:0;padding:0}
.upbtn{background:#d4af37;color:#000;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:12px;font-family:Georgia,serif;font-weight:bold;pointer-events:none;white-space:nowrap}

/* PROGRESS */
.prog{height:4px;background:rgba(212,175,55,.15);border-radius:2px;margin-bottom:12px;display:none;overflow:hidden}
.progbar{height:100%;background:#d4af37;border-radius:2px;width:0;transition:width .3s}

/* NOTICES */
.nok,.nerr{border-radius:6px;padding:10px 16px;font-size:13px;display:none;margin-bottom:12px}
.nok{background:rgba(40,200,100,.1);border:1px solid #2ca05a;color:#4caf80}
.nerr{background:rgba(200,50,50,.1);border:1px solid #8a3030;color:#f07070}

/* STORAGE BAR */
#storageBar{margin-bottom:10px}

/* GRID */
.empty{text-align:center;padding:32px 0;color:#555}
.eico{font-size:34px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.card{background:rgba(255,255,255,.045);border:1px solid #303045;border-radius:9px;padding:13px;display:flex;flex-direction:column;gap:3px;transition:.2s}
.card:hover{border-color:#504a60}
.card.deleted{background:rgba(120,30,30,.07);border-color:#4a2020}
.thumb{width:100%;height:75px;object-fit:cover;border-radius:5px;margin-bottom:3px}
.ficon{font-size:28px;text-align:center;padding:8px 0}
.fname{font-size:12px;color:#e8dfc0;word-break:break-word;line-height:1.4;flex:1}
.fmeta{font-size:10px;color:#666;margin-top:1px}
.dbadge{font-size:10px;color:#e07070;background:rgba(200,50,50,.15);border-radius:3px;padding:2px 6px;text-align:center;margin-top:2px}
.acts{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.abtn{border:none;border-radius:4px;padding:5px 8px;font-size:11px;cursor:pointer;font-family:Georgia,serif;font-weight:bold;flex:1;min-width:0;white-space:nowrap;text-align:center;transition:.15s}
.abtn.order{background:#3a2a00;color:#d4af37}
.abtn.order:hover{background:#5a4400}
.abtn.dl{background:#0d3020;color:#4cdf8a}
.abtn.dl:hover{background:#164030}
.abtn.del{background:#3a1010;color:#e08080}
.abtn.del:hover{background:#5a1818}
.abtn.restore{background:#0a2040;color:#70a8e8}
.abtn.restore:hover{background:#163060}
.abtn.permX{background:#5a0a0a;color:#ff8080;width:100%;margin-top:4px;border-radius:4px;padding:5px;font-size:11px;cursor:pointer;font-family:Georgia,serif;font-weight:bold;text-align:center;border:none;transition:.15s}
.abtn.permX:hover{background:#7a0f0f}
.cta{text-align:center}.cta p{color:#777;font-size:13px;margin-bottom:8px}

/* ── ORDERS ── */
.owrap{max-width:580px;margin:0 auto;padding:28px 16px}
.obox{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.3);border-radius:12px;padding:26px}
.fg{margin-bottom:16px}
.fl{font-size:12px;color:#d4af37;display:block;margin-bottom:5px;letter-spacing:.8px;text-transform:uppercase}
.fi,.fs,.ft{width:100%;background:rgba(255,255,255,.06);border:1px solid #3a3a55;border-radius:6px;padding:11px 13px;color:#f0e6c8;font-size:14px;outline:none;box-sizing:border-box;font-family:Georgia,serif;-webkit-appearance:none}
.fs{background:#12122a;color:#f0e6c8}.ft{resize:vertical;min-height:80px}
.fi:focus,.fs:focus,.ft:focus{border-color:#d4af37}
.osbtn{width:100%;background:#d4af37;color:#000;border:none;border-radius:8px;padding:13px;font-weight:bold;font-size:14px;cursor:pointer;letter-spacing:.8px;font-family:Georgia,serif;margin-top:4px;transition:.2s}
.osbtn:disabled{background:#444;color:#888;cursor:not-allowed}
.onote{color:#555;font-size:11px;text-align:center;margin-top:10px;line-height:1.6}
.sendbox{text-align:center;padding:18px;color:#d4af37;font-size:15px;display:none}
.sucbox{background:rgba(40,200,100,.07);border:1px solid #2ca05a;border-radius:12px;padding:32px 22px;text-align:center;display:none}
.sinico{font-size:46px;margin-bottom:12px}
.stitle{color:#4caf80;font-size:20px;margin-bottom:8px}
.smsg{color:#ccc;line-height:1.7;font-size:13px}
.seml{color:#d4af37;font-weight:bold}
.bagain{margin-top:18px;background:#d4af37;color:#000;border:none;border-radius:30px;padding:10px 26px;font-weight:bold;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.failbox{background:rgba(200,50,50,.07);border:1px solid #7a2020;border-radius:12px;padding:26px 22px;text-align:center;display:none}
.fmsg{color:#f07070;line-height:1.7;font-size:13px;margin-bottom:14px}

/* ── ADMIN MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center;padding:18px}
.mbox{background:#0e0e25;border:2px solid #d4af37;border-radius:14px;padding:30px 26px;max-width:360px;width:100%;box-shadow:0 0 60px rgba(212,175,55,.18);text-align:center}
.mlock{font-size:44px;margin-bottom:6px}
.mtitle{font-size:18px;color:#d4af37;font-weight:bold;margin-bottom:3px}
.msub{font-size:12px;color:#888;margin-bottom:20px;line-height:1.5}
.mi{width:100%;background:rgba(255,255,255,.07);border:1px solid #444;border-radius:6px;padding:11px 13px;color:#f0e6c8;font-size:14px;outline:none;box-sizing:border-box;font-family:Georgia,serif;margin-bottom:10px;-webkit-appearance:none}
.mi:focus{border-color:#d4af37}
.mbtns{display:flex;gap:8px;margin-top:4px}
.mok{flex:2;background:#d4af37;color:#000;border:none;border-radius:7px;padding:11px;font-weight:bold;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.mcan{flex:1;background:transparent;color:#888;border:1px solid #444;border-radius:7px;padding:11px;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.merr{color:#f07070;font-size:12px;margin-top:8px;display:none}
.mhint{font-size:10px;color:#444;margin-top:10px}

/* ── FOOTER ── */
footer{border-top:1px solid #1e1e32;padding:18px;text-align:center;margin-top:40px}
.fbrand{color:#d4af37;font-size:14px;font-weight:bold;margin-bottom:3px}
.fbrand span{color:#7c4dff}
.finfo{color:#555;font-size:11px}

@media(max-width:560px){
  .cgrid{grid-template-columns:repeat(2,1fr)}
  .bover h1{font-size:18px}
  .bar{padding:8px 12px}
  .nb{padding:6px 9px;font-size:11px}
  .bname{font-size:13px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
</style>
</head>
<body>

<!-- ══ ADMIN MODAL ══ -->
<div class="moverlay" id="adminModal">
  <div class="mbox">
    <div class="mlock">🔐</div>
    <div class="mtitle">Admin Access Required</div>
    <div class="msub" id="mSub">Enter your admin credentials</div>
    <input class="mi" id="mUser" type="text"     placeholder="Username"   autocomplete="off" spellcheck="false">
    <input class="mi" id="mKey"  type="password" placeholder="Access Key" autocomplete="off">
    <div class="mbtns">
      <button class="mok"  onclick="doAdminLogin()">🔓 Unlock</button>
      <button class="mcan" onclick="closeAdminModal()">Cancel</button>
    </div>
    <div class="merr" id="mErr">❌ Incorrect username or key. Try again.</div>
    <div class="mhint">Contact the platform owner for access credentials.</div>
  </div>
</div>

<!-- ══ TOPBAR ══ -->
<div class="bar">
  <div>
    <div class="bname">🚀 princesammis<span>NewsFeed</span></div>
    <div class="btag">· ENTERPRISES ·</div>
  </div>
  <nav>
    <button class="nb active" onclick="showPage('home',this)">🏠 Home</button>
    <button class="nb"        onclick="showPage('sales',this)">🛒 Sales</button>
    <button class="nb"        onclick="showPage('orders',this)">📋 Orders</button>
  </nav>
</div>
